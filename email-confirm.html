<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>邮箱验证成功</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #152238;
      --sub: #5b6b86;
      --ok: #0ea76a;
      --btn: #1f4ed8;
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
      background: radial-gradient(circle at 20% 0%, #e7eeff 0%, var(--bg) 50%, #eefaf5 100%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      box-sizing: border-box;
    }
    .card {
      width: min(520px, 100%);
      background: var(--card);
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(20, 34, 56, 0.12);
      padding: 28px 24px;
      text-align: center;
    }
    .icon {
      width: 56px;
      height: 56px;
      margin: 0 auto 12px;
      border-radius: 999px;
      background: rgba(14, 167, 106, 0.12);
      color: var(--ok);
      display: grid;
      place-items: center;
      font-size: 30px;
      font-weight: 700;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 24px;
    }
    p {
      margin: 0;
      color: var(--sub);
      line-height: 1.6;
      font-size: 15px;
    }
    .actions {
      margin-top: 18px;
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
      color: white;
      background: var(--btn);
    }
    .ghost {
      background: #e8eefc;
      color: #1f4ed8;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="icon">✓</div>
    <h1>邮箱验证成功</h1>
    <p>你的账号邮箱已确认。现在可以返回 App 使用邮箱和密码登录。</p>
    <div class="actions">
      <button onclick="window.close()">关闭此页面</button>
      <button class="ghost" onclick="location.reload()">已关闭失败，点此刷新</button>
    </div>
  </main>
  <script>
    // 部分浏览器会阻止脚本直接关闭标签页，失败时保留成功提示即可。
    setTimeout(() => {
      try { window.close(); } catch (_) {}
    }, 1800);
  </script>
</body>
</html>
